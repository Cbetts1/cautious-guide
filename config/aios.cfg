{
  "system": {
    "name": "AIOS",
    "version": "1.0.0",
    "full_name": "Autonomous Intelligence Operating System",
    "hostname": "aios-node"
  },
  "boot": {
    "show_post": true,
    "post_delay": 0.04,
    "verbose": true
  },
  "auth": {
    "pin_required": true,
    "pin_hash": "",
    "pin_salt": "",
    "max_attempts": 5
  },
  "cc": {
    "default_panel": 0,
    "status_refresh_sec": 2,
    "theme": "dark"
  },
  "shell": {
    "history_file": "~/.aios/arrow_history",
    "history_size": 1000,
    "prompt_style": "full"
  },
  "services": {
    "autostart": ["monitor", "aura"]
  },
  "aim": {
    "enabled": true,
    "bridge_port": 7070,
    "proxy_enabled": false
  },
  "aura": {
    "mode": "rule",
    "model_path": "",
    "context_size": 20
  },
  "plugins": {
    "registry_url": "",
    "auto_update": false
  }
}
